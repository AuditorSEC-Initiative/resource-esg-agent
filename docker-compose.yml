version: "3.9"

services:
  api:
    build: .
    container_name: resource-esg-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://esg:esg@postgres:5432/esg
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn agents.resource_esg.api:app --host 0.0.0.0 --port 8000 --workers 2

  postgres:
    image: postgres:15-alpine
    container_name: resource-esg-db
    environment:
      POSTGRES_USER: esg
      POSTGRES_PASSWORD: esg
      POSTGRES_DB: esg
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U esg"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: resource-esg-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana:/etc/grafana/provisioning/dashboards
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: resource-esg-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

volumes:
  pg_data:
  grafana_data:
