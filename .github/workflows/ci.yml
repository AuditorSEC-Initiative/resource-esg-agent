name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi sqlalchemy uvicorn pydantic prometheus-client python-dotenv
          pip install flake8 black

      - name: Lint (flake8)
        run: flake8 agents/ --max-line-length=120 --extend-ignore=E501,W503 --count

      - name: Format check (black)
        run: black --check agents/ --line-length=120

      - name: Syntax check
        run: |
          python -m py_compile agents/resource_esg/models.py
          python -m py_compile agents/resource_esg/service.py
          python -m py_compile agents/resource_esg/api.py
          echo "All syntax checks passed"
